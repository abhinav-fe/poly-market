name: 🔮 Daily Event Generator

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

jobs:
  generate:
    name: Generate Today's Events
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install firebase-admin
        run: npm install firebase-admin

      - name: Run event generator
        env:
          GROQ_API_KEY:             ${{ secrets.GROQ_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          ADMIN_UID:                ${{ secrets.ADMIN_UID }}
        run: node scripts/generate-events.mjs
